name: FIFA Pulse CI Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Unit & Behavioral Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Base Dependencies
        run: npm ci

      - name: Check TypeScript Compilation
        run: npm run lint

      - name: Execute Vitest Test Suite
        run: npm run test

      - name: Generate Code Coverage Reports
        run: npm run test:coverage
